services:
  - type: web
    name: hireops-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    preDeployCommand: npm run migrate:postgres
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MOCK_MODE
        value: "false"
      - key: DB_CLIENT
        value: postgres
      - key: DB_SSL
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        value: noreply@hireops.app
