name: hireops
description: HireOps – CV Management & Recruitment Pipeline SaaS for HR Teams
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── State Management ─────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  flutter_bloc: ^8.1.6
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.3.5

  # ── Navigation ───────────────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Network ──────────────────────────────────────────────────────────────────
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # ── Secure Storage ───────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.0.0

  # ── Serialization ────────────────────────────────────────────────────────────
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # ── File Handling ────────────────────────────────────────────────────────────
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  open_filex: ^4.3.4

  # ── PDF Viewer ───────────────────────────────────────────────────────────────
  syncfusion_flutter_pdfviewer: ^33.2.5

  # ── UI & Animations ──────────────────────────────────────────────────────────
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  fluttertoast: ^8.2.8
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  badges: ^3.1.2
  fl_chart: ^0.68.0

  # ── Forms & Validation ───────────────────────────────────────────────────────
  reactive_forms: ^17.0.1

  # ── Notifications ────────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.2

  # ── Utilities ────────────────────────────────────────────────────────────────
  intl: ^0.20.2
  timeago: ^3.6.1
  equatable: ^2.0.5
  uuid: ^4.4.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Code Generation ──────────────────────────────────────────────────────────
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

  # ── Linting ──────────────────────────────────────────────────────────────────
  flutter_lints: ^4.0.0

dependency_overrides:
  path_provider_foundation: 2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
